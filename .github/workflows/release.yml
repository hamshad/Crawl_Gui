name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            python_arch: arm64
            target: mac-arm64
            electron_build_target: mac
          - os: ubuntu-latest
            python_arch: x64
            target: linux-x64
            electron_build_target: linux
          - os: windows-latest
            python_arch: x64
            target: win-x64
            electron_build_target: win

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller flask flask-cors crawl4ai
          python -m playwright install chromium

      - name: Build Python backend with PyInstaller
        run: |
          pyinstaller --onefile --name backend-server --distpath electron/python-bin backend.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: electron

      - name: Build React frontend
        run: npm run build
        working-directory: electron

      - name: Copy Playwright browsers for bundling
        run: node scripts/copy-browsers.mjs
        working-directory: electron

      - name: Build Electron app (macOS)
        if: matrix.target == 'mac-arm64'
        run: npx electron-builder --config
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Linux)
        if: matrix.target == 'linux-x64'
        run: npx electron-builder --config --publish=never
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Windows)
        if: matrix.target == 'win-x64'
        run: npx electron-builder --config --publish=never
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Coleoptera-${{ matrix.target }}
          path: electron/release/*
          if-no-files-found: error

  release:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Coleoptera ${{ github.ref_name }}
          body: |
            ## Coleoptera ${{ github.ref_name }}

            Automated release of the Coleoptera desktop application.

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS    | ARM64       | `Coleoptera-*-mac-arm64.dmg` / `.zip` |
            | Linux    | x64         | `Coleoptera-*-linux-x64.AppImage` |
            | Windows  | x64         | `Coleoptera-*-win-x64.exe` (NSIS installer) |

            ### How to run

            - **macOS**: Open the `.dmg` and drag Coleoptera to Applications. If macOS warns about an unverified developer, right-click → Open.
            - **Windows**: Run the NSIS installer.
            - **Linux**: Make the `.AppImage` executable (`chmod +x`) and run.

            ### Notes

            - The app bundles its own Python backend (crawl4ai) and Playwright Chromium browser — no additional setup required.
            - macOS code signing is not included by default; see the [README] for signing instructions.
          files: |
            artifacts/**/*
          generate_release_notes: false
